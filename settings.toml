[model]
model_checkpoint_path = "distilgpt2"

# General settings for benchmarks
[benchmarks]
# benchmarks: which benchmarks to run, by name
benchmarks = [
    "mta"
]

[slurm_job]
use_slurm = false
job_name = "test_job"
time = "01:00:00"
ntasks = 1
nodes = 1
mem_per_cpu = "16G"
gpus = 1
conda_env = "mirror-eval"
qos = ""

[mta]
metrics = [
    "llm-as-a-judge"
]
datasets = [
    "royal42/mta-test"
]
llm_judge_model = "distilgpt2"
judge_prompt_name = "scale"
output_dir = "./results/mta"

