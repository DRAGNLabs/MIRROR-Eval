# =============================================================================
# MIRROR-Eval Configuration
# =============================================================================
# This file controls the entire evaluation pipeline. Access any value from code
# via: from mirroreval.config import settings; settings.<section>.<key>
#
# The default values here use small models (distilgpt2) for quick pipeline
# testing. Replace them with larger, instruction-tuned models for meaningful
# evaluation results.

# --- Model Under Test ---
[model]
# HuggingFace model ID or local path for the model being evaluated.
# Every benchmark is responsible for loading this model itself.
# Default "distilgpt2" is for pipeline testing only (~82M params, runs on CPU).
model_checkpoint_path = "Qwen/Qwen2.5-3B-Instruct"
# Quantization for the model under test: "4bit", "8bit", or "" for none.
model_quantize = ""

# --- Benchmark Selection ---
[benchmarks]
# List of benchmark names to run. Each name must have a corresponding entry
# in evaluate.py's BENCHMARKS dict and a [<name>] section below.
benchmarks = [
    "mta"
]

# --- SLURM Configuration ---
# Controls whether benchmarks run locally or are submitted as SLURM jobs
# on an HPC cluster. When use_slurm is true, a job script is rendered from
# the Jinja2 template and submitted via sbatch.
[slurm_job]
# Set to true to submit benchmarks as SLURM jobs instead of running locally.
use_slurm = false
# Name that appears in the SLURM job queue (squeue output).
job_name = "test_job"
# Maximum wall-clock time for the job (HH:MM:SS). Job is killed if exceeded.
time = "01:00:00"
# Number of tasks (processes) per job. Usually 1 unless using MPI.
ntasks = 1
# Number of compute nodes to allocate.
nodes = 1
# Memory allocated per CPU core.
mem_per_cpu = "16G"
# Number of GPUs to request per node.
gpus = 1
# Conda environment to activate inside the SLURM job.
conda_env = "mirror-eval"
# Quality of service tier. Leave empty for the cluster's default QOS.
qos = ""

# --- MTA Benchmark Settings ---
# Multi-Turn Accuracy: measures information retention across multi-turn
# conversations. See docs/benchmarks/multiturn-accuracy.md for details.
[mta]
# Which registered dataset to evaluate on.
dataset = "royal42/mta"
# Partner backend: "local" for a HuggingFace model, "openai" for the OpenAI API.
# When using "openai", set the OPENAI_API_KEY environment variable.
partner_backend = "openai"
# Partner model: HF model ID (local) or OpenAI model name (openai).
partner_checkpoint_path = "gpt-4o-mini"
# Quantization for the partner model: "4bit", "8bit", or "" for none.
# Only used when partner_backend = "local".
partner_quantize = ""
# Number of back-and-forth exchanges per conversation.
num_conversation_turns = 5
# Probe activation source: controls which hidden-state activations the probes
# are applied to during conversation evaluation.
#   "full_context"    — last-token activations from the full conversation prefill
#                       (original prompt + all prior turns). This is the default
#                       and original behavior.
#   "isolated_turn"   — last-token activations from a separate forward pass that
#                       encodes only the current turn (latest user message +
#                       model response), with no conversation history. Tests
#                       whether the fact is present in the current exchange
#                       rather than carried over from the original prompt.
probe_activation_source = "full_context"
# Directory to write results to. Files created:
#   mta_results.json     — final results with metadata and per-turn records
#   mta_progress.jsonl   — incremental progress (one line per turn, crash-safe)
#
# Every run additionally trains shuffled-label probes and applies them alongside
# the real probes (N2 legitimacy control), and simulates one cross-fact control
# conversation per fact (N1 selectivity control). Results for all three are
# written to the same mta_results.json, distinguished by the `probe_type` and
# `is_control` fields on each turn record.
output_dir = "./results/mta"
